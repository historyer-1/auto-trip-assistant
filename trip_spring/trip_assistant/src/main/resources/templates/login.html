<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证码登录 - 智能旅行助手</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body>
<div class="page login-page">
    <div class="simple-header">
        <h1>智能旅行助手</h1>
        <p>输入邮箱并使用验证码登录，查看每日行程、预算和景点安排。</p>
    </div>

    <div class="card login-card">
        <h2>邮箱验证码登录</h2>
        <p class="hint">默认使用前端 Mock 接口演示，验证码固定为 <strong>123456</strong>。</p>
        <div class="form-row">
            <label for="email">邮箱</label>
            <input id="email" type="email" placeholder="请输入邮箱地址">
        </div>
        <div class="form-row inline-row">
            <div class="inline-main">
                <label for="code">验证码</label>
                <input id="code" type="text" maxlength="6" placeholder="6位数字验证码">
            </div>
            <button id="sendCodeBtn" class="btn" type="button">发送验证码</button>
        </div>
        <button id="loginBtn" class="btn btn-primary" type="button">登录</button>
        <p id="loginMessage" class="message"></p>
    </div>
</div>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
